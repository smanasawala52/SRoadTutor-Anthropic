# =============================================================================
#  SRoadTutor — Android (frontend) CI
# =============================================================================
#  Runs on every push / PR that touches /frontend. Steps:
#    1. Checkout
#    2. Set up JDK 17 + Gradle cache
#    3. `chmod +x gradlew` (Windows-committed wrappers lose the +x bit)
#    4. `./gradlew :app:lintDebug :app:testDebugUnitTest`
#    5. `./gradlew :app:assembleDebug` (debug APK build)
#    6. Upload lint report + APK as artifacts
# =============================================================================

name: Android CI

on:
  push:
    branches: [main, qa, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    branches: [main, qa, develop]
    paths:
      - 'frontend/**'

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Lint + Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('frontend/**/*.gradle*', 'frontend/**/gradle-wrapper.properties', 'frontend/gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make Gradle Wrapper executable
        # Files committed from Windows lose the +x bit; restore it so the
        # wrapper can run on the Linux runner.
        working-directory: frontend
        run: chmod +x ./gradlew

      - name: Run lint + unit tests
        working-directory: frontend
        run: ./gradlew --no-daemon :app:lintDebug :app:testDebugUnitTest

      - name: Upload Lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-report
          path: frontend/app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports
          path: frontend/app/build/reports/tests/testDebugUnitTest
          if-no-files-found: ignore
          retention-days: 14

  build-debug-apk:
    name: Build Debug APK
    needs: analyze-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/qa')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('frontend/**/*.gradle*', 'frontend/**/gradle-wrapper.properties', 'frontend/gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make Gradle Wrapper executable
        working-directory: frontend
        run: chmod +x ./gradlew

      - name: Assemble debug APK
        working-directory: frontend
        run: ./gradlew --no-daemon :app:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: sroadtutor-debug-apk
          path: frontend/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
