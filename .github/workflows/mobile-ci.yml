# =============================================================================
#  SRoadTutor — Mobile CI
# =============================================================================
#  Runs on every push / PR touching /mobile. Steps:
#    1. Checkout
#    2. Set up Flutter 3.24 (stable)
#    3. `flutter pub get`
#    4. `flutter analyze` (static checks: lints + strict casts)
#    5. `dart run build_runner build` (Drift + Riverpod code-gen)
#    6. `flutter test --coverage` (unit + widget tests)
#    7. Upload the lcov file
#    8. On pushes to main/qa: build the QA APK and upload as an artifact
#       so you can download + side-load on a friend's phone from the GitHub
#       Actions page.
# =============================================================================

name: Mobile CI

on:
  push:
    branches: [main, qa, develop]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    branches: [main, qa, develop]
    paths:
      - 'mobile/**'

concurrency:
  group: mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze + Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 (for Android Gradle build)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter 3.24 (stable)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: stable
          cache: true

      - name: flutter pub get
        working-directory: mobile
        run: flutter pub get

      - name: Generate code (Drift + Riverpod)
        working-directory: mobile
        run: dart run build_runner build --delete-conflicting-outputs

      - name: flutter analyze
        working-directory: mobile
        run: flutter analyze

      - name: flutter test (with coverage)
        working-directory: mobile
        run: flutter test --coverage --reporter expanded

      - name: Upload lcov coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: mobile/coverage/lcov.info
          retention-days: 14

  build-qa-apk:
    name: Build QA APK
    needs: analyze-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/qa')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: stable
          cache: true

      - name: flutter pub get
        working-directory: mobile
        run: flutter pub get

      - name: Generate code
        working-directory: mobile
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK (QA flavor, release)
        working-directory: mobile
        run: flutter build apk --release --flavor qa -t lib/main_qa.dart

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sroadtutor-qa-apk
          path: mobile/build/app/outputs/flutter-apk/app-qa-release.apk
          retention-days: 30
