# Maven wrapper config.  When you run `./mvnw`, the wrapper downloads the Maven
# distribution below on first use and caches it in your Maven local repo.
# Do NOT commit a maven-wrapper.jar here — the wrapperUrl will fetch it if
# missing.  (Generated automatically by `mvn wrapper:wrapper` if you want to
# regenerate; we ship the .properties only.)
distributionUrl=https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/3.9.9/apache-maven-3.9.9-bin.zip
wrapperUrl=https://repo.maven.apache.org/maven2/org/apache/maven/wrapper/maven-wrapper/3.3.2/maven-wrapper-3.3.2.jar
