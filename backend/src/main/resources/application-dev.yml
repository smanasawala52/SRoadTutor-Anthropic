# Dev-only overrides. Chatty logs, hot data, developer-friendly.

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # Flyway is the single source of truth for schema in EVERY profile,
      # including dev. `validate` lets Hibernate fail-fast at boot if a
      # JPA entity drifts from the migration-built schema, instead of
      # silently mutating dev DBs (which then mask V-migration bugs).
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Turn ON BOTH seed migrations in dev:
  #   - V4__seed_dev_data.sql       (synthetic test fixtures)
  #   - V7__seed_customer_data.sql  (Drivers Student Manager.xlsx import)
  # Every other profile keeps these "false" so QA / prod / test never
  # accidentally insert seed data.
  flyway:
    enabled: true
    placeholders:
      seed-dev: "true"
      seed-customer: "true"
server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-minutes: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:15}
    refresh-token-expiration-days: ${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:30}
    issuer: sroadtutor-dev

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

# Make Swagger UI slightly more discoverable in dev.
springdoc:
  swagger-ui:
    operations-sorter: method
    tags-sorter: alpha
