# Test profile. Used by @ActiveProfiles("test") in JUnit tests.
# Datasource is injected by Testcontainers at runtime via @DynamicPropertySource.
# See AuthControllerIntegrationTest for the pattern.

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: false

app:
  jwt:
    secret: test-jwt-secret-at-least-64-characters-long-so-HS256-signer-is-happy-xxxxx
    access-token-expiration-minutes: 15
    refresh-token-expiration-days: 30
    issuer: sroadtutor-test
  oauth:
    google:
      client-id: test-google-client-id
      client-secret: test-google-client-secret
  cors:
    allowed-origins: "*"

logging:
  level:
    com.sroadtutor: DEBUG
    org.springframework.security: INFO
