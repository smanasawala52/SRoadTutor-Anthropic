# Prod overrides. Strict, quiet, no SQL in logs.

spring:
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        generate_statistics: false

  # Explicit: PROD NEVER runs either seed migration. Belt-and-suspenders
  # on top of the base default in application.yml. The synthetic dev seed
  # AND the Drivers Student Manager.xlsx customer seed are both pinned
  # off — production data must come through real signup / invitation
  # flows only.
  flyway:
    placeholders:
      seed-dev: "false"
      seed-customer: "false"

server:
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never

logging:
  level:
    com.sroadtutor: INFO
    org.hibernate.SQL: WARN
    org.springframework.web: WARN

management:
  endpoint:
    health:
      show-details: never
  endpoints:
    web:
      exposure:
        include: health
