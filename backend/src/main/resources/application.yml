# =====================================================================
# Base config. Values are resolved from environment variables using the
# ${VAR:default} syntax. Profile-specific overrides live in the sibling
# application-<profile>.yml files.
#
# Set SPRING_PROFILES_ACTIVE (dev / qa / prod / test) to pick one.
# =====================================================================

spring:
  application:
    name: sroadtutor-backend

  profiles:
    # Default profile is 'dev' locally; Railway will override via env.
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # -------------------------------------------------------------------
  # Datasource — populated from env.  Fail fast if missing.
  # -------------------------------------------------------------------
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: SRoadTutorPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # -------------------------------------------------------------------
  # JPA / Hibernate.
  # NOTE: we NEVER use ddl-auto=update in real envs — Flyway owns schema.
  # -------------------------------------------------------------------
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
          batch_size: 25
        order_inserts: true
        order_updates: true

  # -------------------------------------------------------------------
  # Flyway — database migrations.
  #
  # placeholders.seed-dev gates V4__seed_dev_data.sql.
  # placeholders.seed-customer gates V7__seed_customer_data.sql.
  # Each migration body checks its placeholder at runtime and no-ops
  # unless the value is the literal string "true". Base defaults are
  # "false" so QA / prod / test never accidentally insert seed data.
  # Both are flipped to "true" in application-dev.yml only.
  # -------------------------------------------------------------------
  flyway:
    enabled: true
    # Supabase ships with auth/storage/realtime schemas, which makes the DB
    # look "non-empty" to Flyway. Without baseline-version=0, Flyway would
    # silently baseline at whatever it detects as "latest" and SKIP V1.
    # Setting baseline-version=0 forces Flyway to record the baseline BELOW
    # V1 so V1 (and every other migration) is actually executed.
    baseline-on-migrate: true
    baseline-version: 0
    # Only touch the 'public' schema; leave Supabase's internal schemas alone.
    schemas: public
    default-schema: public
    locations: classpath:db/migration
    validate-on-migrate: true
    placeholders:
      seed-dev: "false"
      seed-customer: "false"

  # -------------------------------------------------------------------
  # JSON / Jackson
  # -------------------------------------------------------------------
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
      indent-output: false
    time-zone: UTC

server:
  port: ${SERVER_PORT:${PORT:8080}}
  compression:
    enabled: true
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

# ---------------------------------------------------------------------
# Custom application config — mapped onto Java @ConfigurationProperties.
# ---------------------------------------------------------------------
app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-minutes: ${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:15}
    refresh-token-expiration-days: ${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:30}
    issuer: sroadtutor
  oauth:
    google:
      client-id: ${GOOGLE_OAUTH_CLIENT_ID}
      client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: Authorization,Content-Type,Accept,X-Requested-With,X-Request-Id
    allow-credentials: true
    max-age: 3600

# ---------------------------------------------------------------------
# Actuator — used by Railway's health check.  Only health is public.
# ---------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  info:
    env:
      enabled: false

# ---------------------------------------------------------------------
# Swagger / OpenAPI
# ---------------------------------------------------------------------
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.sroadtutor: ${LOG_LEVEL_APP:INFO}
    org.hibernate.SQL: WARN
    org.springframework.security: INFO
