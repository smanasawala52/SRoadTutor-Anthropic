# Test-scoped copy. Stays beside test sources so it's always on the classpath
# when running under @ActiveProfiles("test").

spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: test-jwt-secret-at-least-64-characters-long-so-HS256-signer-is-happy-xxxxx
    access-token-expiration-minutes: 15
    refresh-token-expiration-days: 30
    issuer: sroadtutor-test
  oauth:
    google:
      client-id: test-google-client-id
      client-secret: test-google-client-secret
  cors:
    allowed-origins: "*"
