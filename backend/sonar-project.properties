# SonarCloud project config. Override these via -Dsonar.* or env in CI.
# Create a free SonarCloud org + project at https://sonarcloud.io and paste its
# values here. The CI workflow uses the SONAR_TOKEN secret to authenticate.

sonar.projectKey=sroadtutor_backend
sonar.organization=sroadtutor
sonar.projectName=SRoadTutor Backend
sonar.host.url=https://sonarcloud.io

sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes

# Reuse the JaCoCo report from `mvn verify`
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Exclude boilerplate from coverage calculations (mirrors pom.xml excludes)
sonar.coverage.exclusions=\
  **/SRoadTutorApplication.java, \
  **/dto/**, \
  **/model/**, \
  **/config/**

sonar.exclusions=**/*.generated.*
sonar.sourceEncoding=UTF-8
