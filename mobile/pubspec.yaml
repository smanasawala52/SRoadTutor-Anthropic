name: sroadtutor
description: "SRoadTutor — offline-first driving-school app (Android + iOS)."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

# --- Runtime dependencies -------------------------------------------------
dependencies:
  flutter:
    sdk: flutter

  # --- Networking -----------------------------------------------------
  dio: ^5.7.0                    # HTTP client w/ interceptors + cancellation
  pretty_dio_logger: ^1.4.0      # readable request/response logs (dev only)
  retry: ^3.1.2                  # exponential-backoff on network ops

  # --- State management ------------------------------------------------
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # --- Routing ---------------------------------------------------------
  go_router: ^14.2.7

  # --- Local storage (offline-first) ----------------------------------
  drift: ^2.20.2                 # type-safe SQLite ORM (schema in core/storage)
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0
  flutter_secure_storage: ^9.2.2 # Keychain / EncryptedSharedPreferences for JWTs

  # --- OAuth providers -------------------------------------------------
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.0.0

  # --- Connectivity + sync --------------------------------------------
  connectivity_plus: ^6.0.5      # online/offline events
  uuid: ^4.5.0

  # --- Config / env -----------------------------------------------------
  flutter_dotenv: ^5.2.1         # loads .env.dev/.qa/.env.prod at startup

  # --- Code quality / runtime checks ----------------------------------
  equatable: ^2.0.5              # value equality for domain entities
  intl: ^0.19.0                  # date / number formatting for multi-locale
  logger: ^2.4.0

  cupertino_icons: ^1.0.8

# --- Dev / test dependencies ----------------------------------------------
dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Lints
  flutter_lints: ^5.0.0

  # Code generation
  build_runner: ^2.4.13
  drift_dev: ^2.20.2
  riverpod_generator: ^2.4.3
  custom_lint: ^0.6.7
  riverpod_lint: ^2.3.13

  # Testing
  mocktail: ^1.0.4
  fake_async: ^1.3.1
  network_image_mock: ^2.1.1

flutter:
  uses-material-design: true
  assets:
    - .env.dev
    - .env.qa
    - .env.prod
